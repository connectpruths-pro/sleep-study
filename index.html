<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleep Analysis</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { text-align: center; color: #1a73e8; margin-bottom: 25px; }
        .question-group { margin-bottom: 20px; }
        .question { display: flex; align-items: center; background: #fff; border: 1px solid #ddd; padding: 12px; border-radius: 8px; margin-bottom: 10px; cursor: pointer; }
        input[type="checkbox"] { width: 18px; height: 18px; margin-right: 12px; }
        label { cursor: pointer; color: #333; font-size: 15px; flex: 1; }
        button { background-color: #1a73e8; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background-color: #1557b0; }
        #result { margin-top: 20px; padding: 15px; border-radius: 8px; text-align: center; font-weight: bold; display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2>Sleep Analysis</h2>
    
    <div class="question-group">
        <div class="question">
            <input type="checkbox" id="snoring">
            <label for="snoring">Do you snore loudly?</label>
        </div>
        <div class="question">
            <input type="checkbox" id="tired">
            <label for="tired">Do you feel tired?</label>
        </div>
        <div class="question">
            <input type="checkbox" id="observed">
            <label for="observed">Stop breathing at night?</label>
        </div>
        <div class="question">
            <input type="checkbox" id="pressure">
            <label for="pressure">High blood pressure?</label>
        </div>
    </div>

    <button id="submitBtn" onclick="sendData()">Submit Analysis</button>

    <div id="result"></div>
</div>

<script>
async function sendData() {
    const res = document.getElementById('result');
    const btn = document.getElementById('submitBtn');
    
    btn.disabled = true;
    btn.innerText = "Analyzing...";
    res.style.display = "block";
    res.innerHTML = "Processing...";

    // This captures the TRUE/FALSE value of each box
    const payload = {
        "snoring": document.getElementById('snoring').checked,
        "tired": document.getElementById('tired').checked,
        "observed": document.getElementById('observed').checked,
        "pressure": document.getElementById('pressure').checked
    };

    try {
        // Use the /submit URL as we identified earlier
        const API_URL = "https://y1taonalm3.execute-api.ap-south-1.amazonaws.com/prod/submit"; 

        const response = await fetch(API_URL, {
            method: "POST",
            mode: "cors", // Explicitly handle cross-origin
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        const rawData = await response.json();
        
        // AWS often wraps the response, this unwraps it safely
        let data = rawData;
        if (rawData.body) {
            data = typeof rawData.body === 'string' ? JSON.parse(rawData.body) : rawData.body;
        }

        const score = data.score !== undefined ? data.score : 0;
        const severity = data.severity || "Calculation Done";

        res.innerHTML = "Risk Level: " + severity + "<br>Score: " + score + "/4";
        
        // UI colors for risk levels
        res.style.backgroundColor = score >= 3 ? "#fce8e6" : "#e6f4ea";
        res.style.color = score >= 3 ? "#d93025" : "#137333";
        
    } catch (err) {
        console.error("Submission Error:", err);
        res.innerHTML = "Error: Check AWS Trigger Connection.";
        res.style.backgroundColor = "#fce8e6";
    } finally {
        btn.disabled = false;
        btn.innerText = "Submit Analysis";
    }
}
</script>

</body>
</html>
