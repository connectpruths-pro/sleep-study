<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleep Health Analysis</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { 
    background: white; 
    padding: 2rem; 
    border-radius: 12px; 
    width: 100%; 
    max-width: 400px; /* This prevents the horizontal line */
    text-align: center; 
}
.question { 
    display: flex; /* This puts the checkbox next to the text */
    align-items: center; 
    margin-bottom: 12px; /* This creates the vertical space between questions */
}
        .question:hover { border-color: #1a73e8; background: #f8fbff; }
        input[type="checkbox"] { width: 20px; height: 20px; margin-right: 15px; cursor: pointer; }
        label { cursor: pointer; font-size: 16px; color: #3c4043; flex-grow: 1; text-align: left; }
        button { background-color: #1a73e8; color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        button:hover { background-color: #1557b0; }
        button:disabled { background-color: #ccc; }
        #result { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; font-weight: bold; line-height: 1.5; }
    </style>
</head>
<body>

<div class="card">
    <h2>Sleep Analysis</h2>
    
    <div class="question">
        <input type="checkbox" id="snoring">
        <label for="snoring">Do you snore loudly?</label>
    </div>
    <div class="question">
        <input type="checkbox" id="tired">
        <label for="tired">Do you feel tired?</label>
    </div>
    <div class="question">
        <input type="checkbox" id="observed">
        <label for="observed">Stop breathing at night?</label>
    </div>
   <div class="question">
    <input type="checkbox" id="snoring">
    <label for="snoring">Do you snore loudly?</label>
</div>
<div class="question">
    <input type="checkbox" id="tired">
    <label for="tired">Do you feel tired?</label>
</div>
<script>
async function sendData() {
    const res = document.getElementById('result');
    const btn = document.getElementById('submitBtn');
    
    btn.disabled = true;
    btn.innerText = "Processing...";
    res.style.display = "block";
    res.innerHTML = "Analyzing...";

    const payload = {
        "snoring": document.getElementById('snoring').checked,
        "tired": document.getElementById('tired').checked,
        "observed": document.getElementById('observed').checked,
        "pressure": document.getElementById('pressure').checked
    };

    try {
        // Updated URL with /submit
        const API_URL = "https://y1taonalm3.execute-api.ap-south-1.amazonaws.com/prod/submit"; 

        const response = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        const rawData = await response.json();
        let data = rawData.body ? (typeof rawData.body === 'string' ? JSON.parse(rawData.body) : rawData.body) : rawData;

        const score = data.score !== undefined ? data.score : 0;
        const severity = data.severity || "Analysis Complete";

        res.innerHTML = "Risk Level: " + severity + "<br>Score: " + score + "/4";
        res.style.backgroundColor = score >= 3 ? "#fce8e6" : "#e6f4ea";
        res.style.color = score >= 3 ? "#d93025" : "#137333";
        
    } catch (err) {
        res.innerHTML = "Error: Check your AWS CORS and URL.";
        res.style.backgroundColor = "#fce8e6";
    } finally {
        btn.disabled = false;
        btn.innerText = "Submit Analysis";
    }
}
</script>

</body>
</html>
