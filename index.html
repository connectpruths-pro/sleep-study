<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleep Analysis</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding-top: 50px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 350px; z-index: 10; }
        h2 { text-align: center; color: #1a73e8; }
        .row { display: flex; align-items: center; margin-bottom: 20px; cursor: pointer; padding: 10px; border: 1px solid #eee; border-radius: 8px; }
        .row:hover { background-color: #f8f9fa; }
        input[type="checkbox"] { width: 22px; height: 22px; margin-right: 15px; cursor: pointer; }
        label { cursor: pointer; flex-grow: 1; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #1a73e8; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background: #1557b0; }
        #result { margin-top: 20px; padding: 15px; display: none; text-align: center; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

<div class="question">
    <input type="checkbox" id="snoring">
    <label for="snoring">Do you snore loudly?</label>
</div>
<div class="question">
    <input type="checkbox" id="tired">
    <label for="tired">Do you feel tired?</label>
</div>
<div class="question">
    <input type="checkbox" id="observed">
    <label for="observed">Stop breathing at night?</label>
</div>
<div class="question">
    <input type="checkbox" id="pressure">
    <label for="pressure">High blood pressure?</label>
</div>

<script>
async function sendData() {
    const res = document.getElementById('result');
    const btn = document.getElementById('submitBtn');
    
    btn.disabled = true;
    btn.innerText = "Processing...";
    res.style.display = "block";
    res.innerHTML = "Analyzing...";

    // This collects the checkbox data
   const payload = {
    "snoring": document.getElementById('snoring').checked,
    "tired": document.getElementById('tired').checked,
    "observed": document.getElementById('observed').checked,
    "pressure": document.getElementById('pressure').checked
};
    try {
        // !!! DOUBLE CHECK THIS URL MATCHES YOUR AWS TRIGGER !!!
        const API_URL = "https://y1taonalm3.execute-api.ap-south-1.amazonaws.com/prod/submit";

        const response = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        });

        const rawData = await response.json();
        
        // This 'unwraps' the data from AWS
        let data = rawData.body ? (typeof rawData.body === 'string' ? JSON.parse(rawData.body) : rawData.body) : rawData;

        const score = (data.score !== undefined) ? data.score : 0;
        const severity = data.severity || "Calculation Complete";

        res.innerHTML = "Risk Level: " + severity + "<br>Score: " + score + "/4";
        res.style.backgroundColor = score >= 3 ? "#fce8e6" : "#e6f4ea";
        res.style.color = score >= 3 ? "#d93025" : "#137333";
        
    } catch (err) {
        res.innerHTML = "Error: Check your AWS Trigger URL.";
        res.style.backgroundColor = "#fce8e6";
    } finally {
        btn.disabled = false;
        btn.innerText = "Submit Analysis";
    }
}
</script>
</html>
